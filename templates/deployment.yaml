apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  labels:
    appName: {{ .Values.appName }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      appName: {{ .Values.appName }}
  template:
    metadata:
      labels:
        appName: {{ .Values.appName }}
    spec:
      containers:
        - name: {{ .Values.appName }}
          image: 471451201019.dkr.ecr.us-east-1.amazonaws.com/{{ .Values.appName }}
          envFrom:
            - configMapRef:
                name: {{ .Values.appName }}-config